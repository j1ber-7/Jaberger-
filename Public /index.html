<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Jaberger | جابرجر 🍔</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Jaberger 🍔</h1>
        <p>أطيب برجر في المنطقة من يد جابر!</p>
    </header>

    <section id="menu">
        <h2>المنيو 📋</h2>
        <div id="items-container"></div>
    </section>

    <section id="order">
        <h2>اطلب الآن 🚀</h2>
        <form id="orderForm">
            <input type="text" id="customerName" placeholder="اسمك الكريم" required>
            <input type="text" id="burgerType" placeholder="نوع البرجر" required>
            <button type="submit">إرسال الطلب</button>
        </form>
        <p id="msg"></p>
    </section>

    <script src="script.js"></script>
</body>
</html>
